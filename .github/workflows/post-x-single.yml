name: Content Shark v2 - Post X Single

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "週ディレクトリ（空欄なら最新週から取り出す）"
        required: false
        type: string
      dry_run:
        description: "true で投稿せずログだけ"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # JST 朝08:00 = UTC 前日23:00
    - cron: "0 23 * * *"
    # JST 晩21:00 = UTC 同日12:00
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post single tweet
        env:
          MODE: single
          WEEK_DIR: ${{ inputs.week_dir }}
          DRY_RUN: ${{ inputs.dry_run }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node scripts/post-to-x.mjs

      - name: Commit posted marker
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: mark single posted_to_x $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - name: Notify Discord on failure
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '{"content":"❌ **Post X Single 失敗**\\n- Trigger: %s\\n- Run: %s"}' \
            "${{ github.event_name }}" "$RUN_URL")
          curl -sS -H "Content-Type: application/json" -d "$BODY" "$WEBHOOK" || true
