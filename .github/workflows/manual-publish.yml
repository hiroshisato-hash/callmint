name: Content Shark v2 - Manual Publish (Curation / Seminar)

on:
  workflow_dispatch:
    inputs:
      type:
        description: "コンテンツ種別"
        required: true
        default: curation
        type: choice
        options:
          - curation
          - seminar
      source:
        description: "curation: 記事URL or 本文抜粋 / seminar: セミナー情報テキスト"
        required: true
        type: string
      notes:
        description: "（任意）編集者からの追加指示・切り口メモ"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (no deps; native fetch)
        run: npm install --no-audit --no-fund

      - name: Generate content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODE: ${{ inputs.type }}
          SOURCE: ${{ inputs.source }}
          NOTES: ${{ inputs.notes }}
        run: node scripts/generate.mjs

      - name: Commit & push
        env:
          MODE: ${{ inputs.type }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: manual-generate content $(date -u +%Y-%m-%d) [$MODE]"
            git push
          fi

      - name: Notify Discord on failure
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MODE: ${{ inputs.type }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '{"content":"❌ **Content Shark v2 (Manual) 失敗**\\n- Mode: %s\\n- Trigger: %s\\n- Run: %s"}' \
            "${MODE:-?}" "${{ github.event_name }}" "$RUN_URL")
          curl -sS -H "Content-Type: application/json" -d "$BODY" "$WEBHOOK" || true
