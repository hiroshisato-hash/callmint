name: Content Shark v2 - Post to X

on:
  workflow_dispatch:
    inputs:
      file:
        description: "生成済みJSONのパス（空欄なら generated/ の最新未投稿を選ぶ）"
        required: false
        type: string
      dry_run:
        description: "true にすると実際にツイートせずログだけ出す"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  # 自動投稿を有効化する場合は下のコメントを外す（JST 10:00 = UTC 01:00）
  # schedule:
  #   - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          FILE: ${{ inputs.file }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/post-to-x.mjs

      - name: Commit posted marker
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: mark posted_to_x $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify Discord on failure
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '{"content":"❌ **Content Shark v2 (Post to X) 失敗**\\n- Trigger: %s\\n- Run: %s"}' \
            "${{ github.event_name }}" "$RUN_URL")
          curl -sS -H "Content-Type: application/json" -d "$BODY" "$WEBHOOK" || true
