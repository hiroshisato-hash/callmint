name: Content Shark v2 - Post X Thread

on:
  workflow_dispatch:
    inputs:
      file:
        description: "投稿する thread JSON のパス（空欄なら最新週の Mon/Thu スレッドを自動選択）"
        required: false
        type: string
      dry_run:
        description: "true で投稿せずログだけ"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # JST 月曜10:00 = UTC 月曜01:00 (note誘導スレッド)
    - cron: "0 1 * * 1"
    # JST 木曜10:00 = UTC 木曜01:00 (独立スレッド)
    - cron: "0 1 * * 4"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post thread
        env:
          MODE: thread
          FILE: ${{ inputs.file }}
          DRY_RUN: ${{ inputs.dry_run }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node scripts/post-to-x.mjs

      - name: Commit posted marker
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: mark thread posted_to_x $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify Discord on failure
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '{"content":"❌ **Post X Thread 失敗**\\n- Trigger: %s\\n- Run: %s"}' \
            "${{ github.event_name }}" "$RUN_URL")
          curl -sS -H "Content-Type: application/json" -d "$BODY" "$WEBHOOK" || true
